model:
  d_model: 128
  n_head: 4
  n_layers: 4
  dim_feedforward: 256
  dropout: 0.1

train:
  board_size: 5          # 5 for mini chess (5×5), 8 for full chess (8×8)
  max_moves: 40          # game ends after this many moves; winner determined by points_tiebreak
  points_tiebreak: true  # false = draw on move limit; true = player with more material wins
  k_samples: 16
  lr: 0.0001
  pretrain_iterations: 200
  warmup_steps: 200
  grad_clip: 1.0
  target_ema: 0.995
  c_policy: 1.0
  c_value: 1.0
  c_mask: 1.0
  mc_prob: 0.1
  mc_rollout_depth: 6  # null = roll out to terminal
  games_per_update: 4
  buffer_size: 128
  train_games_per_step: 8
  num_iterations: 1000
  eval_interval: 50
  eval_games: 20
  log_dir: runs/fog_chess
  checkpoint_dir: checkpoints/fog_chess
  checkpoint_interval: 50
  resume: null  # path to a .pt checkpoint file to resume from